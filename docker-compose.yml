name: mvbar

services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      TZ: Europe/London

      # internal (single-container) connection strings
      DATABASE_URL: postgresql://mvbar:mvbar@127.0.0.1:5432/mvbar
      REDIS_URL: redis://127.0.0.1:6379
      MEILI_HOST: http://127.0.0.1:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}

      # app config
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-auto}
      COOKIE_NAME: ${COOKIE_NAME:-mvbar_token}
      APP_DOMAIN: ${APP_DOMAIN:-}
      LASTFM_API_KEY: ${LASTFM_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}

      # worker
      MUSIC_DIRS: /music
      AUDIOBOOK_DIRS: /audiobooks
      TEMPO_DETECT: ${TEMPO_DETECT:-0}
      TEMPO_MODE: ${TEMPO_MODE:-batch}
      TEMPO_METHOD: ${TEMPO_METHOD:-energy}
      TEMPO_MIN_CONF: ${TEMPO_MIN_CONF:-0.35}
      TEMPO_CONCURRENCY: ${TEMPO_CONCURRENCY:-2}
      TEMPO_BACKFILL_INTERVAL_MS: ${TEMPO_BACKFILL_INTERVAL_MS:-1800000}
      TEMPO_BACKFILL_BATCH: ${TEMPO_BACKFILL_BATCH:-50}

      # web -> api internal calls
      API_INTERNAL_BASE: http://127.0.0.1:3001

    volumes:
      # curated music selection from /mnt/music
      - /mnt/music/ABBA:/music/ABBA:ro
      - /mnt/music/ACDC:/music/ACDC:ro
      - /mnt/music/Adele:/music/Adele:ro
      - /mnt/music/Amy Winehouse:/music/Amy Winehouse:ro
      - /mnt/music/Arctic Monkeys:/music/Arctic Monkeys:ro
      - /mnt/music/Bob Dylan:/music/Bob Dylan:ro
      - /mnt/music/Bob Marley & The Wailers:/music/Bob Marley & The Wailers:ro
      - /mnt/music/Bruce Springsteen:/music/Bruce Springsteen:ro
      - /mnt/music/Coldplay:/music/Coldplay:ro
      - /mnt/music/Daft Punk:/music/Daft Punk:ro
      - /mnt/music/David Bowie:/music/David Bowie:ro
      - /mnt/music/Drake:/music/Drake:ro
      - /mnt/music/Eminem:/music/Eminem:ro
      - /mnt/music/Fleetwood Mac:/music/Fleetwood Mac:ro
      - /mnt/music/Frank Sinatra:/music/Frank Sinatra:ro
      - /mnt/music/Jay-Z:/music/Jay-Z:ro
      - /mnt/music/Kanye West:/music/Kanye West:ro
      - /mnt/music/Kendrick Lamar:/music/Kendrick Lamar:ro
      - /mnt/music/Led Zeppelin:/music/Led Zeppelin:ro
      - /mnt/music/Metallica:/music/Metallica:ro
      - /mnt/music/Michael Jackson:/music/Michael Jackson:ro
      - /mnt/music/Miles Davis:/music/Miles Davis:ro
      - /mnt/music/Nirvana:/music/Nirvana:ro
      - /mnt/music/Pink Floyd:/music/Pink Floyd:ro
      - /mnt/music/Queen:/music/Queen:ro
      - /mnt/music/Radiohead:/music/Radiohead:ro
      - /mnt/music/Red Hot Chili Peppers:/music/Red Hot Chili Peppers:ro
      - /mnt/music/The Beatles:/music/The Beatles:ro
      - /mnt/music/U2:/music/U2:ro
      - /mnt/music/2Pac:/music/2Pac:ro
      - /mnt/music/50 Cent:/music/50 Cent:ro
      - /mnt/music/Taco Hemingway:/music/Taco Hemingway:ro
      - /mnt/music/Pezet:/music/Pezet:ro

      # persistent data
      - pg:/var/lib/postgresql/data
      - redis:/data/redis
      - meili:/meili_data
      - caddy_data:/data/caddy
      - caddy_config:/config/caddy
      - cache:/data/cache
      - device_logs:/data/device-logs
      - hls:/hls
      - podcasts:/podcasts
      - audiobooks:/audiobooks

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15

volumes:
  pg:
  redis:
  meili:
  caddy_data:
  caddy_config:
  cache:
  device_logs:
  hls:
  podcasts:
  audiobooks:
